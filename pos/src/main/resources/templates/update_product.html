<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật món ăn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-warning">📝 Chỉnh sửa món ăn</h2>
        <form th:action="@{/saveProduct}" th:object="${product}" method="POST">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label>Tên món:</label>
                <input type="text" th:field="*{name}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Giá tiền:</label>
                <input type="number" th:field="*{price}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Danh mục:</label>
                <input type="text" th:field="*{category}" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary">Cập nhật ngay</button>
            <a th:href="@{/}" class="btn btn-secondary">Quay lại</a>
        </form>
    </div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold text-warning" href="/">☕POS Coffee</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/">📦 Quản lý món</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-info" href="/pos">🛒 Bán hàng (POS)</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/order-history">📊 Lịch sử & Doanh thu</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
