<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm món mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="card p-4 shadow">
        <h2 class="text-center mb-4">➕ Thêm món mới vào thực đơn</h2>
        <form th:action="@{/saveProduct}" th:object="${product}" method="POST">
            <div class="mb-3">
                <label class="form-label">Tên món:</label>
                <input type="text" th:field="*{name}" class="form-control" placeholder="Ví dụ: Cà phê Muối" required>
            </div>
            <div class="mb-3">
                <label class="small text-secondary fw-bold">Danh mục:</label>
<select id="product-category" class="form-control form-control-custom">
    <option value="Đồ uống">Đồ uống</option>
    <option value="Bánh">Thức ăn/Bánh</option>
</select>
            </div>
            <div class="mb-3">
                <label class="form-label">Giá tiền:</label>
                <input type="number" th:field="*{price}" class="form-control" required>
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-primary px-5">Lưu món</button>
                <a th:href="@{/}" class="btn btn-secondary">Hủy</a>
            </div>
        </form>
    </div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold text-warning" href="/">☕ POS Coffee</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/">📦 Quản lý món</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-info" href="/pos">🛒 Bán hàng (POS)</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/order-history">📊 Lịch sử & Doanh thu</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
