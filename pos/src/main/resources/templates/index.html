<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Coffee POS System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="text-primary">☕ Danh sách món Cafe</h1>
        <a th:href="@{/showNewProductForm}" class="btn btn-success">➕ Thêm món mới</a>
    </div>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold text-warning" href="/">☕ POS COFFEE</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link active" href="/"><i class="fas fa-home me-1"></i> Trang chủ</a>
            <a class="nav-link" href="/pos"><i class="fas fa-shopping-cart me-1"></i> Bán hàng</a>
            <a class="nav-link" href="/order-history"><i class="fas fa-chart-line me-1"></i> Doanh thu</a>
        </div>
    </div>
</nav>
    <table class="table table-striped table-bordered shadow">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tên món</th>
                <th>Giá (VNĐ)</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody>
    <tr th:each="product : ${listProducts}">
        <td th:text="${product.id}"></td>
        <td th:text="${product.name}"></td>
        <td th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
        <td>
            <a th:href="@{/showFormForUpdate/{id}(id=${product.id})}" class="btn btn-warning btn-sm">Sửa</a>
            
            <a th:href="@{/deleteProduct/{id}(id=${product.id})}" class="btn btn-danger btn-sm" 
               onclick="return confirm('Xóa món này?')">Xóa</a>
        </td>
    </tr>
</tbody>
    </table>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold text-warning" href="/">☕ Coffee POS</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/">📦 Quản lý món</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-info" href="/pos">🛒 Bán hàng (POS)</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/order-history">📊 Lịch sử & Doanh thu</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
