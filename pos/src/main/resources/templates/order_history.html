<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .table-container { background: rgba(30, 41, 59, 0.7); border-radius: 15px; padding: 20px; border: 1px solid #334155; }
        .table { color: #f8fafc; }
        .btn-back { margin-bottom: 20px; border-radius: 10px; }
    </style>
</head>
<body class="container py-4">

    <a href="/" class="btn btn-outline-warning btn-back">
        <i class="fas fa-arrow-left me-2"></i> Quay lại trang chủ
    </a>

    <div class="table-container shadow-lg">
        <h2 class="mb-4 text-info fw-bold"><i class="fas fa-history me-2"></i> Nhật ký bán hàng</h2>
        
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Mã đơn</th>
                    <th>Ngày giờ</th>
                    <th>Chi tiết món</th> <th>Tổng tiền</th>
                    <th class="text-center">Thao tác</th> </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${listOrders}">
                    <td th:text="${order.id}"></td>
                    <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
                    
                    <td>
                        <ul class="list-unstyled mb-0 small">
                            <li th:each="item : ${order.items}">
                                <span th:text="${item.productName}"></span> 
                                <span class="text-warning" th:text="'x' + ${item.quantity}"></span>
                            </li>
                        </ul>
                    </td>
                    
                    <td class="fw-bold text-success" 
                        th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                    
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-danger" 
                                th:onclick="'deleteOrder(' + ${order.id} + ')'">
                            <i class="fas fa-trash"></i> Xóa
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        function deleteOrder(id) {
            Swal.fire({
                title: 'Xác nhận xóa?',
                text: "Dữ liệu đơn hàng sẽ bị mất vĩnh viễn!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'Xóa ngay'
            }).then((result) => {
                if (result.isConfirmed) {
                    fetch('/api/orders/delete/' + id, { method: 'DELETE' })
                    .then(response => {
                        if (response.ok) {
                            Swal.fire('Đã xóa!', 'Đơn hàng đã được loại bỏ.', 'success')
                            .then(() => location.reload());
                        }
                    });
                }
            });
        }
    </script>
</body>
</html>
